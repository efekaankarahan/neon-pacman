<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Holpringo 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #eaeaea;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: Arial;
            font-size: 18px;
            color: #222;
        }
    </style>
</head>

<body>

    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="win"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);

        let camera = new THREE.PerspectiveCamera(
            60,
            window.innerWidth / window.innerHeight,
            0.1,
            2000
        );

        let renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Top-down camera
        camera.position.set(0, 60, 0);
        camera.lookAt(0, 0, 0);

        // Light
        let light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(20, 50, 20);
        light.castShadow = true;
        scene.add(light);

        let ambient = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambient);

        // Ground
        let groundGeo = new THREE.PlaneGeometry(500, 500);
        let groundMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        let ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid
        let grid = new THREE.GridHelper(500, 50, 0xcccccc, 0xdddddd);
        scene.add(grid);

        // Player
        let playerRadius = 3;
        let playerGeo = new THREE.CylinderGeometry(playerRadius, playerRadius, 2, 32);
        let playerMat = new THREE.MeshStandardMaterial({ color: 0x3333ff });
        let player = new THREE.Mesh(playerGeo, playerMat);
        player.castShadow = true;
        player.position.y = 1;
        scene.add(player);

        let objects = [];
        let score = 0;

        function randomShape(radius) {
            let type = Math.floor(Math.random() * 3);
            let geo;

            if (type === 0)
                geo = new THREE.BoxGeometry(radius, radius, radius);
            else if (type === 1)
                geo = new THREE.SphereGeometry(radius, 16, 16);
            else
                geo = new THREE.ConeGeometry(radius, radius * 2, 16);

            let mat = new THREE.MeshStandardMaterial({
                color: new THREE.Color(`hsl(${Math.random() * 360},70%,60%)`)
            });

            let mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;

            mesh.position.x = (Math.random() - 0.5) * 400;
            mesh.position.z = (Math.random() - 0.5) * 400;
            mesh.position.y = radius / 2;

            mesh.userData.radius = radius;

            scene.add(mesh);
            objects.push(mesh);
        }

        for (let i = 0; i < 150; i++) {
            randomShape(Math.random() * 2 + 0.5);
        }

        // Mouse world movement
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();
        let moveTarget = new THREE.Vector3();

        window.addEventListener("mousemove", e => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            let intersects = raycaster.intersectObject(ground);

            if (intersects.length > 0) {
                moveTarget.copy(intersects[0].point);
            }
        });

        function animate() {
            requestAnimationFrame(animate);

            // Smooth movement
            player.position.x += (moveTarget.x - player.position.x) * 0.05;
            player.position.z += (moveTarget.z - player.position.z) * 0.05;

            // Eat
            objects.forEach((obj, index) => {
                let dx = player.position.x - obj.position.x;
                let dz = player.position.z - obj.position.z;
                let dist = Math.sqrt(dx * dx + dz * dz);

                if (dist < playerRadius) {
                    let growth = obj.userData.radius / (playerRadius * 2);
                    playerRadius += growth * 0.2;

                    scene.remove(obj);
                    objects.splice(index, 1);
                    randomShape(Math.random() * 2 + 0.5);

                    score += Math.floor(obj.userData.radius * 10);
                    document.getElementById("score").innerText = "Score: " + score;

                    scene.remove(player);
                    playerGeo = new THREE.CylinderGeometry(playerRadius, playerRadius, 2, 32);
                    player = new THREE.Mesh(playerGeo, playerMat);
                    player.position.y = 1;
                    scene.add(player);
                }
            });

            // Camera follow top-down
            camera.position.x = player.position.x;
            camera.position.z = player.position.z;
            camera.lookAt(player.position);

            if (score >= 1000) {
                document.getElementById("win").innerText = "YOU WIN!";
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>
</body>

</html>
