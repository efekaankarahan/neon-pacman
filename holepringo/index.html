<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Holpringo 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #eaeaea;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-family: Arial;
            font-size: 18px;
            color: #222;
        }

        #endScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial;
            text-align: center;
            display: none;
        }

        button {
            padding: 10px 20px;
            font-size: 18px;
        }
    </style>
</head>

<body>

    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="timer"
            style="position:fixed; top:20px; left:20px; font-size:24px; font-family:Arial; color:#000; z-index:9999;">
            02:00</div>
        <div id="win"></div>
    </div>

    <div id="endScreen">
        <h2>Time's Up!</h2>
        <p id="finalScore"></p>
        <button onclick="restart()">Play Again</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene, camera, renderer;
        let player, playerGeo, playerMat;
        let objects = [];
        let score = 0;
        let timeLeft = 120;
        const timerEl = document.getElementById("timer");
        let gameActive = true;

        init();
        animate();
        startTimer();

        function init() {

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf0f0f0);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.set(0, 60, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            let light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(20, 50, 20);
            scene.add(light);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));

            let ground = new THREE.Mesh(
                new THREE.PlaneGeometry(500, 500),
                new THREE.MeshStandardMaterial({ color: 0xffffff })
            );
            ground.rotation.x = -Math.PI / 2;
            scene.add(ground);

            scene.add(new THREE.GridHelper(500, 50, 0xcccccc, 0xdddddd));

            // Player
            playerGeo = new THREE.CylinderGeometry(3, 3, 2, 32);
            playerMat = new THREE.MeshStandardMaterial({ color: 0x3366ff });
            player = new THREE.Mesh(playerGeo, playerMat);
            player.position.y = 1;
            scene.add(player);

            // Spawn
            for (let i = 0; i < 150; i++) {
                spawn();
            }

        }

        function spawn() {
            let r = Math.random() * 2 + 0.5;
            let geo = new THREE.SphereGeometry(r, 16, 16);
            let mat = new THREE.MeshStandardMaterial({
                color: new THREE.Color(`hsl(${Math.random() * 360},70%,60%)`)
            });
            let mesh = new THREE.Mesh(geo, mat);
            mesh.position.set((Math.random() - 0.5) * 400, r / 2, (Math.random() - 0.5) * 400);
            mesh.userData.radius = r;
            scene.add(mesh);
            objects.push(mesh);
        }

        // CONTROLS
        let move = { x: 0, z: 0 };

        window.addEventListener("keydown", e => {
            if (e.key === "ArrowUp") move.z = -1;
            if (e.key === "ArrowDown") move.z = 1;
            if (e.key === "ArrowLeft") move.x = -1;
            if (e.key === "ArrowRight") move.x = 1;
        });
        window.addEventListener("keyup", e => {
            if (e.key === "ArrowUp" || e.key === "ArrowDown") move.z = 0;
            if (e.key === "ArrowLeft" || e.key === "ArrowRight") move.x = 0;
        });

        let touchStartX = 0, touchStartY = 0;

        window.addEventListener("touchstart", e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        window.addEventListener("touchmove", e => {
            let dx = e.touches[0].clientX - touchStartX;
            let dy = e.touches[0].clientY - touchStartY;
            move.x = dx * 0.01;
            move.z = dy * 0.01;
        });
        window.addEventListener("touchend", () => {
            move.x = 0; move.z = 0;
        });

        // TIMER
        function startTimer() {
            let interval = setInterval(() => {
                if (!gameActive) {
                    clearInterval(interval);
                    return;
                }
                timeLeft--;
                let mins = Math.floor(timeLeft / 60);
                let secs = timeLeft % 60;
                timerEl.innerText = String(mins).padStart(2, '0') + ":" + String(secs).padStart(2, '0');
                if (timeLeft <= 0) {
                    gameActive = false;
                    document.getElementById("endScreen").style.display = "block";
                    document.getElementById("finalScore").innerText = "Final Score: " + score;
                }
            }, 1000);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameActive) {
                player.position.x += move.x;
                player.position.z += move.z;

                objects.forEach((obj, index) => {
                    let dx = player.position.x - obj.position.x;
                    let dz = player.position.z - obj.position.z;
                    let dist = Math.sqrt(dx * dx + dz * dz);
                    if (dist < 3) {
                        score += Math.floor(obj.userData.radius * 10);
                        document.getElementById("score").innerText = "Score: " + score;
                        scene.remove(obj);
                        objects.splice(index, 1);
                        spawn();
                    }
                });

                camera.position.x = player.position.x;
                camera.position.z = player.position.z;
                camera.lookAt(player.position);
            }

            renderer.render(scene, camera);
        }

        function restart() {
            location.reload();
        }

    </script>
</body>

</html>
