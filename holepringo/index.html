<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Holepringo 2D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #ffffff;
        }

        canvas {
            display: block;
            position: relative;
            z-index: 1;
        }

        #ui {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-family: Arial;
            font-size: 22px;
            color: #000;
        }
    </style>
</head>

<body>

    <div id="ui">
        Score: <span id="score">0</span> |
        Time: <span id="time">120</span>
    </div>

    <div id="startScreen"
        style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; display:flex; align-items:center; justify-content:center; flex-direction:column; font-family:Arial; text-align:center; z-index:9999;">
        <h1>Holepringo</h1>
        <p style="max-width:400px;font-size:18px;">Move with arrow keys (PC) or drag your finger (mobile). Eat the
            colorful dots to earn points. You have 2 minutes. Get the highest score!</p>
        <button onclick="startGame()" style="margin-top:20px; padding:12px 24px; font-size:18px;">Start Game</button>
    </div>

    <canvas id="game"></canvas>

    <div id="menuScreen"
        style="position:fixed; top:0; left:0; width:100%; height:100%; background:white; display:none; align-items:center; justify-content:center; flex-direction:column; font-family:Arial; z-index:9999;">
        <h1>Time's Up!</h1>
        <button onclick="restartGame()" style="margin:10px;padding:10px 20px;font-size:18px;">Restart</button>
        <button onclick="goMainMenu()" style="margin:10px;padding:10px 20px;font-size:18px;">Main Menu</button>
    </div>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 20,
            vx: 0,
            vy: 0
        };

        let score = 0;
        let timeLeft = 120;
        let gameActive = false;
        let gameStarted = false;

        let objects = [];

        // Spawn objects
        function spawn() {
            objects.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 10 + 5,
                color: `hsl(${Math.random() * 360},70%,60%)`
            });
        }

        for (let i = 0; i < 50; i++) spawn();

        // KEYBOARD CONTROL
        let keys = {};

        window.addEventListener("keydown", e => {
            keys[e.key] = true;
        });
        window.addEventListener("keyup", e => {
            keys[e.key] = false;
        });

        // TOUCH CONTROL
        let touchStartX = 0, touchStartY = 0;

        window.addEventListener("touchstart", e => {
            if (!gameActive) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });

        window.addEventListener("touchmove", e => {
            if (!gameActive) return;
            let dx = e.touches[0].clientX - touchStartX;
            let dy = e.touches[0].clientY - touchStartY;

            player.vx = dx * 0.01;
            player.vy = dy * 0.01;
        });

        window.addEventListener("touchend", () => {
            player.vx = 0;
            player.vy = 0;
        });

        // TIMER
        let timerInterval;
        function startTimer() {
            timerInterval = setInterval(() => {
                if (!gameActive) return;
                timeLeft--;
                document.getElementById("time").innerText = timeLeft;
                if (timeLeft <= 0) {
                    gameActive = false;
                }
            }, 1000);
        }

        // GAME LOOP
        function update() {
            if (!gameActive) return;

            // Keyboard movement
            if (keys["ArrowUp"]) player.vy -= 0.3;
            if (keys["ArrowDown"]) player.vy += 0.3;
            if (keys["ArrowLeft"]) player.vx -= 0.3;
            if (keys["ArrowRight"]) player.vx += 0.3;

            // Friction (kayma efekti)
            player.vx *= 0.95;
            player.vy *= 0.95;

            player.x += player.vx;
            player.y += player.vy;

            // Boundaries
            if (player.x < 0) player.x = 0;
            if (player.y < 0) player.y = 0;
            if (player.x > canvas.width) player.x = canvas.width;
            if (player.y > canvas.height) player.y = canvas.height;

            // Eat objects
            objects.forEach((obj, index) => {
                let dx = player.x - obj.x;
                let dy = player.y - obj.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < player.radius) {
                    score += 10;
                    document.getElementById("score").innerText = score;
                    objects.splice(index, 1);
                    spawn();
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Player
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#ff3333";
            ctx.fill();

            ctx.lineWidth = 3;
            ctx.strokeStyle = "#000000";
            ctx.stroke();

            // Objects
            objects.forEach(obj => {
                ctx.beginPath();
                ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
                ctx.fillStyle = obj.color;
                ctx.fill();
            });

            if (!gameActive && gameStarted) {
                document.getElementById("menuScreen").style.display = "flex";
                canvas.style.pointerEvents = "none";
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();

        function startGame() {
            document.getElementById("startScreen").style.display = "none";
            gameActive = true;
            gameStarted = true;
            startTimer();
        }

        function restartGame() {
            // Stop old timer
            clearInterval(timerInterval);

            // Reset state
            score = 0;
            timeLeft = 120;
            gameActive = true;

            // Reset player
            player.x = canvas.width / 2;
            player.y = canvas.height / 2;
            player.vx = 0;
            player.vy = 0;

            // Reset objects
            objects = [];
            for (let i = 0; i < 50; i++) spawn();

            // Reset UI
            document.getElementById("score").innerText = "0";
            document.getElementById("time").innerText = "120";
            document.getElementById("menuScreen").style.display = "none";
            canvas.style.pointerEvents = "auto";

            // Restart timer
            startTimer();
        }

        function goMainMenu() {
            window.location.href = "../index.html";
        }
    </script>

</body>

</html>
