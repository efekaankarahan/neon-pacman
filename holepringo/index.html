<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Holpringo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
            font-family: Arial;
        }

        canvas {
            display: block;
        }

        #menu {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
        }

        button {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div id="menu">
        <h1>Holpringo</h1>
        <p>Eat everything. Grow bigger. 2 Minutes.</p>
        <button onclick="startGame()">Start Game</button>
    </div>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let player, objects, score, timeLeft, playing;
        let mouse = { x: canvas.width / 2, y: canvas.height / 2 };

        function startGame() {
            document.getElementById("menu").style.display = "none";

            player = {
                x: canvas.width / 2,
                y: canvas.height / 2,
                radius: 30
            };

            objects = [];
            score = 0;
            timeLeft = 120; // 2 dakika
            playing = true;

            for (let i = 0; i < 80; i++) spawnObject();

            gameLoop();
        }

        function spawnObject() {
            objects.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 20 + 5,
                depth: Math.random() * 0.5 + 0.5,
                color: `hsl(${Math.random() * 360},70%,60%)`
            });
        }

        canvas.addEventListener("mousemove", e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        function update() {
            if (!playing) return;

            // Smooth movement
            player.x += (mouse.x - player.x) * 0.05;
            player.y += (mouse.y - player.y) * 0.05;

            objects.forEach((obj, index) => {
                let dx = player.x - obj.x;
                let dy = player.y - obj.y;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < player.radius) {
                    player.radius += obj.radius * 0.05;
                    score += Math.floor(obj.radius);
                    objects.splice(index, 1);
                    spawnObject();
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 3D background grid feel
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Objects
            objects.forEach(obj => {
                let gradient = ctx.createRadialGradient(
                    obj.x, obj.y, 1,
                    obj.x, obj.y, obj.radius
                );
                gradient.addColorStop(0, "white");
                gradient.addColorStop(1, obj.color);
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
                ctx.fill();
            });

            // Player (hole)
            let holeGradient = ctx.createRadialGradient(
                player.x, player.y, 1,
                player.x, player.y, player.radius
            );
            holeGradient.addColorStop(0, "#000");
            holeGradient.addColorStop(1, "#222");

            ctx.fillStyle = holeGradient;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fill();

            // UI
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText("Score: " + score, 20, 30);
            ctx.fillText("Time: " + Math.floor(timeLeft), 20, 60);
        }

        function gameLoop() {
            if (!playing) return;

            update();
            draw();

            requestAnimationFrame(gameLoop);
        }

        // Timer
        setInterval(() => {
            if (playing) {
                timeLeft--;
                if (timeLeft <= 0) {
                    playing = false;
                    document.getElementById("menu").style.display = "block";
                    document.getElementById("menu").innerHTML = `
        <h1>Time's Up!</h1>
        <p>Your Score: ${score}</p>
        <button onclick="startGame()">Play Again</button>
      `;
                }
            }
        }, 1000);

    </script>
</body>

</html>
