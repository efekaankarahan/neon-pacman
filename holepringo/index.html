<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Holpringo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 20,
            speed: 4
        };

        let objects = [];
        let score = 0;
        let gameOver = false;

        function spawnObject() {
            let radius = Math.random() * 25 + 5;
            objects.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: radius,
                color: `hsl(${Math.random() * 360}, 70%, 60%)`
            });
        }

        for (let i = 0; i < 40; i++) spawnObject();

        let keys = {};

        window.addEventListener("keydown", e => keys[e.key] = true);
        window.addEventListener("keyup", e => keys[e.key] = false);

        function update() {
            if (gameOver) return;

            if (keys["ArrowUp"] || keys["w"]) player.y -= player.speed;
            if (keys["ArrowDown"] || keys["s"]) player.y += player.speed;
            if (keys["ArrowLeft"] || keys["a"]) player.x -= player.speed;
            if (keys["ArrowRight"] || keys["d"]) player.x += player.speed;

            objects.forEach((obj, index) => {
                let dx = player.x - obj.x;
                let dy = player.y - obj.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < player.radius + obj.radius) {
                    if (player.radius > obj.radius) {
                        player.radius += obj.radius * 0.1;
                        score += 10;
                        objects.splice(index, 1);
                        spawnObject();
                    } else {
                        gameOver = true;
                    }
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Player
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = "black";
            ctx.fill();

            // Objects
            objects.forEach(obj => {
                ctx.beginPath();
                ctx.arc(obj.x, obj.y, obj.radius, 0, Math.PI * 2);
                ctx.fillStyle = obj.color;
                ctx.fill();
            });

            // Score
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText("Score: " + score, 20, 30);

            if (gameOver) {
                ctx.fillStyle = "red";
                ctx.font = "50px Arial";
                ctx.fillText("GAME OVER", canvas.width / 2 - 150, canvas.height / 2);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>

</body>

</html>
