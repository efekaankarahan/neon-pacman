<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Holpringo 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-family: Arial;
        }
    </style>
</head>

<body>

    <div id="ui">
        <div id="score">Score: 0</div>
        <div id="win"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        let scene = new THREE.Scene();
        let camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        let renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.background = new THREE.Color(0x111111);

        // Light
        let light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 7);
        scene.add(light);

        let ambient = new THREE.AmbientLight(0x404040);
        scene.add(ambient);

        // Player (Hole)
        let playerRadius = 3;
        let playerGeo = new THREE.SphereGeometry(playerRadius, 32, 32);
        let playerMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
        let player = new THREE.Mesh(playerGeo, playerMat);
        scene.add(player);

        player.position.y = 0;

        camera.position.z = 20;
        camera.position.y = 15;
        camera.lookAt(player.position);

        // Objects
        let objects = [];
        let score = 0;

        function spawnObject() {
            let radius = Math.random() * 2 + 0.5;
            let geo = new THREE.SphereGeometry(radius, 16, 16);
            let mat = new THREE.MeshStandardMaterial({
                color: new THREE.Color(`hsl(${Math.random() * 360},70%,50%)`)
            });
            let mesh = new THREE.Mesh(geo, mat);

            mesh.position.x = (Math.random() - 0.5) * 200;
            mesh.position.z = (Math.random() - 0.5) * 200;
            mesh.position.y = 0;

            mesh.userData.radius = radius;

            scene.add(mesh);
            objects.push(mesh);
        }

        for (let i = 0; i < 200; i++) spawnObject();

        // Mouse control
        let mouse = { x: 0, y: 0 };

        window.addEventListener("mousemove", e => {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        function animate() {
            requestAnimationFrame(animate);

            // Move player
            player.position.x += mouse.x * 0.5;
            player.position.z += mouse.y * 0.5;

            // Eat objects
            objects.forEach((obj, index) => {
                let dx = player.position.x - obj.position.x;
                let dz = player.position.z - obj.position.z;
                let dist = Math.sqrt(dx * dx + dz * dz);

                if (dist < playerRadius) {
                    let growth = obj.userData.radius / (playerRadius * 2);
                    playerRadius += growth * 0.3;

                    scene.remove(obj);
                    objects.splice(index, 1);
                    spawnObject();

                    score += Math.floor(obj.userData.radius * 10);
                    document.getElementById("score").innerText = "Score: " + score;

                    // Update geometry
                    scene.remove(player);
                    playerGeo = new THREE.SphereGeometry(playerRadius, 32, 32);
                    player = new THREE.Mesh(playerGeo, playerMat);
                    scene.add(player);
                }
            });

            // Camera zoom out as grow
            camera.position.z = 20 + playerRadius * 2;
            camera.lookAt(player.position);

            // Win condition
            if (score >= 1000) {
                document.getElementById("win").innerText = "YOU WIN!";
            }

            renderer.render(scene, camera);
        }

        animate();
    </script>

</body>

</html>
