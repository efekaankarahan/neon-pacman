<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Catch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            min-height: 100vh;
            background: #fff;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.08);
        }

        /* ── Header ── */
        .app-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            border-bottom: 1px solid #f1f5f9;
        }

        .app-header .close-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            font-size: 1.1rem;
            cursor: pointer;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .app-header .close-btn:hover {
            background: #e2e8f0;
        }

        .app-header .title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a1a2e;
        }

        .app-header .settings-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: #f1f5f9;
            font-size: 1rem;
            cursor: pointer;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Screens ── */
        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .hidden {
            display: none !important;
        }

        /* ── START SCREEN ── */
        #startScreen {
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 30px;
        }

        #startScreen h1 {
            font-size: 2.4rem;
            font-weight: 900;
            color: #1a1a2e;
            margin-bottom: 6px;
        }

        #startScreen .subtitle {
            font-size: 0.95rem;
            color: #94a3b8;
            font-weight: 500;
            margin-bottom: 32px;
        }

        /* Preview Grid */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(4, 52px);
            gap: 8px;
            justify-content: center;
            margin-bottom: 36px;
        }

        .preview-tile {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: #64748b;
            background: #f1f5f9;
            transition: all 0.3s;
        }

        .preview-tile.highlight {
            background: linear-gradient(135deg, #4f6ef7, #6c8cff);
            color: #fff;
            box-shadow: 0 4px 12px rgba(79, 110, 247, 0.3);
        }

        .btn-play {
            width: 100%;
            max-width: 260px;
            padding: 16px;
            background: linear-gradient(135deg, #4f6ef7, #6c8cff);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 110, 247, 0.35);
        }

        .start-bottom {
            display: flex;
            justify-content: center;
            gap: 32px;
            margin-top: 36px;
            padding-top: 24px;
            border-top: 1px solid #f1f5f9;
        }

        .start-stat {
            text-align: center;
        }

        .start-stat .stat-icon {
            font-size: 1.4rem;
            margin-bottom: 4px;
        }

        .start-stat .stat-text {
            font-size: 0.65rem;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ── GAME SCREEN ── */
        .game-stats-row {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .game-stat-card {
            flex: 1;
            background: #f8fafc;
            border: 1.5px solid #e8ecf2;
            border-radius: 12px;
            padding: 10px 14px;
            text-align: left;
        }

        .game-stat-card .stat-label {
            font-size: 0.6rem;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .game-stat-card .stat-val {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1a1a2e;
            margin-top: 2px;
        }

        .game-stat-card .stat-val .combo-badge {
            font-size: 0.8rem;
            color: #a78bfa;
        }

        /* Timer bar */
        .timer-section {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .timer-icon {
            font-size: 1rem;
            color: #94a3b8;
        }

        .timer-bar-bg {
            flex: 1;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .timer-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #4f6ef7, #6c8cff);
            border-radius: 4px;
            transition: width 1s linear;
        }

        .timer-text {
            font-size: 0.85rem;
            font-weight: 700;
            color: #1a1a2e;
            min-width: 42px;
            text-align: right;
        }

        /* Grid */
        #grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            margin-bottom: 16px;
        }

        .tile {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            font-weight: 700;
            color: #475569;
            background: #f1f5f9;
            border-radius: 10px;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s;
            border: 2px solid transparent;
            -webkit-tap-highlight-color: transparent;
        }

        .tile:hover {
            background: #e8ecf2;
        }

        .tile.selected {
            background: linear-gradient(135deg, #4f6ef7, #6c8cff);
            color: #fff;
            border-color: #4f6ef7;
            box-shadow: 0 2px 8px rgba(79, 110, 247, 0.3);
            transform: scale(1.05);
        }

        .tile.correct {
            background: linear-gradient(135deg, #22c55e, #4ade80) !important;
            color: #fff !important;
            border-color: #22c55e !important;
            box-shadow: 0 2px 8px rgba(34, 197, 94, 0.3);
        }

        .tile.wrong {
            animation: shake 0.4s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-4px);
            }

            75% {
                transform: translateX(4px);
            }
        }

        /* Current word display */
        .word-display {
            background: #f0f4ff;
            border-radius: 12px;
            padding: 12px 20px;
            margin-bottom: 16px;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .word-display span {
            font-size: 1.3rem;
            font-weight: 800;
            color: #4f6ef7;
            letter-spacing: 4px;
        }

        /* Action buttons */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 16px;
        }

        .action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
        }

        .action-btn .btn-circle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .action-btn .btn-circle.primary {
            background: linear-gradient(135deg, #4f6ef7, #6c8cff);
            color: #fff;
            box-shadow: 0 4px 12px rgba(79, 110, 247, 0.3);
        }

        .action-btn .btn-label {
            font-size: 0.6rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .action-btn:hover .btn-circle {
            transform: scale(1.1);
        }

        /* Bottom nav */
        .bottom-nav {
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid #f1f5f9;
            margin-top: auto;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            font-size: 0.6rem;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-item .nav-icon {
            font-size: 1.2rem;
        }

        .nav-item.active {
            color: #4f6ef7;
        }

        /* ── END SCREEN ── */
        #endScreen {
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
        }

        .end-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-8px);
            }
        }

        #endScreen h2 {
            font-size: 1.8rem;
            font-weight: 900;
            color: #1a1a2e;
            margin-bottom: 4px;
        }

        .end-subtitle {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 28px;
        }

        .end-stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 28px;
            width: 100%;
        }

        .end-stat-card {
            background: #f8fafc;
            border-radius: 14px;
            padding: 16px;
        }

        .end-stat-card .es-label {
            font-size: 0.65rem;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .end-stat-card .es-value {
            font-size: 1.5rem;
            font-weight: 800;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .end-stat-card .es-value .es-icon {
            font-size: 1rem;
        }

        .es-value.blue {
            color: #4f6ef7;
        }

        .es-value.green {
            color: #22c55e;
        }

        .es-value.gold {
            color: #f59e0b;
        }

        .btn-restart-game {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4f6ef7, #6c8cff);
            color: #fff;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-restart-game:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(79, 110, 247, 0.35);
        }

        .btn-main-menu {
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #1a1a2e;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-main-menu:hover {
            background: #f8fafc;
            border-color: #cbd5e1;
        }

        /* ── Animations ── */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .screen {
            animation: fadeIn 0.4s ease;
        }

        .word-found-toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: linear-gradient(135deg, #22c55e, #4ade80);
            color: #fff;
            padding: 12px 28px;
            border-radius: 14px;
            font-size: 1.1rem;
            font-weight: 700;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(34, 197, 94, 0.3);
        }

        .word-found-toast.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 420px) {
            .app-container {
                max-width: 100%;
            }

            .tile {
                font-size: 1rem;
            }
        }

        @media (min-width: 421px) {
            body {
                padding: 20px;
            }

            .app-container {
                min-height: auto;
                border-radius: 24px;
                overflow: hidden;
            }
        }
    </style>
</head>

<body>

    <div class="app-container">

        <!-- Header (visible during game & end) -->
        <div class="app-header hidden" id="appHeader">
            <button class="close-btn" onclick="goMainMenu()">✕</button>
            <span class="title">Word Catch</span>
            <button class="settings-btn">⚙️</button>
        </div>

        <!-- ── START SCREEN ── -->
        <div class="screen" id="startScreen">
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;">
                <h1>Word Catch</h1>
                <p class="subtitle">Find the hidden magic</p>

                <div class="preview-grid">
                    <div class="preview-tile">W</div>
                    <div class="preview-tile highlight">O</div>
                    <div class="preview-tile">R</div>
                    <div class="preview-tile">D</div>
                    <div class="preview-tile">S</div>
                    <div class="preview-tile highlight">E</div>
                    <div class="preview-tile highlight">A</div>
                    <div class="preview-tile">R</div>
                    <div class="preview-tile">C</div>
                    <div class="preview-tile">H</div>
                    <div class="preview-tile">G</div>
                    <div class="preview-tile highlight">A</div>
                    <div class="preview-tile">M</div>
                    <div class="preview-tile">E</div>
                    <div class="preview-tile">S</div>
                    <div class="preview-tile">!</div>
                </div>

                <button class="btn-play" onclick="startGame()">▶ Play Now</button>


            </div>
        </div>

        <!-- ── GAME SCREEN ── -->
        <div class="screen hidden" id="gameScreen">
            <div class="game-stats-row">
                <div class="game-stat-card">
                    <div class="stat-label">Score</div>
                    <div class="stat-val" id="scoreDisplay">0</div>
                </div>
                <div class="game-stat-card">
                    <div class="stat-label">Combo</div>
                    <div class="stat-val"><span id="comboDisplay">1</span><span class="combo-badge">x ✨</span></div>
                </div>
            </div>

            <div class="timer-section">
                <span class="timer-icon">⏱️</span>
                <div class="timer-bar-bg">
                    <div class="timer-bar-fill" id="timerBar" style="width:100%"></div>
                </div>
                <span class="timer-text" id="timerText">00:60</span>
            </div>

            <div id="grid"></div>

            <div class="word-display">
                <span id="currentWordDisplay">&nbsp;</span>
            </div>

            <div class="action-buttons">
                <button class="action-btn" onclick="submitWord()">
                    <div class="btn-circle primary">▶</div>
                    <span class="btn-label">Submit</span>
                </button>
            </div>


        </div>

        <!-- ── END SCREEN ── -->
        <div class="screen hidden" id="endScreen">
            <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;">
                <div class="end-icon">✍️</div>
                <h2>Time's Up!</h2>
                <p class="end-subtitle">Great effort this round!</p>

                <div class="end-stats-grid">
                    <div class="end-stat-card">
                        <div class="es-label">Words Found</div>
                        <div class="es-value blue"><span class="es-icon">📝</span> <span id="wordsFoundStat">0</span>
                        </div>
                    </div>
                    <div class="end-stat-card">
                        <div class="es-label">Final Score</div>
                        <div class="es-value blue"><span class="es-icon">⭐</span> <span id="finalScoreStat">0</span>
                        </div>
                    </div>
                    <div class="end-stat-card">
                        <div class="es-label">Accuracy</div>
                        <div class="es-value green"><span class="es-icon">🎯</span> <span id="accuracyStat">0%</span>
                        </div>
                    </div>
                    <div class="end-stat-card">
                        <div class="es-label">Rank</div>
                        <div class="es-value gold"><span class="es-icon">🏅</span> <span id="rankStat">Bronze</span>
                        </div>
                    </div>
                </div>

                <button class="btn-restart-game" onclick="restartGame()">🔄 Restart Game</button>
                <button class="btn-main-menu" onclick="goMainMenu()">🏠 Main Menu</button>
            </div>
        </div>

    </div>

    <!-- Toast -->
    <div class="word-found-toast" id="toast">+10 Word Found!</div>

    <script>
        const words = [
            "CAT", "DOG", "SUN", "MOON", "STAR", "FISH",
            "BIRD", "TREE", "WIND", "RAIN", "FIRE", "GOLD",
            "KING", "ROSE", "LAMP", "BEAR", "FROG", "LION",
            "WAVE", "LAKE", "SAND", "WOLF", "DUCK", "DEER"
        ];

        let gridSize = 6;
        let grid = [];
        let selectedTiles = [];
        let currentWord = "";
        let score = 0;
        let timeLeft = 60;
        let timerInterval;
        let wordsFound = 0;
        let totalAttempts = 0;
        let combo = 1;
        let isSelecting = false;
        let foundWords = [];

        function startGame() {
            document.getElementById("startScreen").classList.add("hidden");
            document.getElementById("gameScreen").classList.remove("hidden");
            document.getElementById("endScreen").classList.add("hidden");
            document.getElementById("appHeader").classList.remove("hidden");

            score = 0;
            timeLeft = 60;
            wordsFound = 0;
            totalAttempts = 0;
            combo = 1;
            foundWords = [];

            updateScoreDisplay();
            updateTimerDisplay();
            updateComboDisplay();
            createGrid();
            timerInterval = setInterval(updateTimer, 1000);
        }

        function updateTimer() {
            timeLeft--;
            updateTimerDisplay();
            document.getElementById("timerBar").style.width = ((timeLeft / 60) * 100) + "%";

            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                endGame();
            }
        }

        function updateTimerDisplay() {
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            document.getElementById("timerText").innerText =
                String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
        }

        function updateScoreDisplay() {
            document.getElementById("scoreDisplay").innerText = score.toLocaleString();
        }

        function updateComboDisplay() {
            document.getElementById("comboDisplay").innerText = combo;
        }

        function createGrid() {
            const gridDiv = document.getElementById("grid");
            gridDiv.innerHTML = "";
            grid = [];

            // Place some words in the grid
            let placedLetters = new Array(gridSize * gridSize).fill(null);

            // Try to place a few words horizontally
            let wordsToPlace = words.sort(() => Math.random() - 0.5).slice(0, 6);
            for (let w of wordsToPlace) {
                let placed = false;
                for (let attempt = 0; attempt < 20 && !placed; attempt++) {
                    let row = Math.floor(Math.random() * gridSize);
                    let col = Math.floor(Math.random() * (gridSize - w.length + 1));
                    let canPlace = true;
                    for (let i = 0; i < w.length; i++) {
                        let idx = row * gridSize + col + i;
                        if (placedLetters[idx] !== null && placedLetters[idx] !== w[i]) {
                            canPlace = false;
                            break;
                        }
                    }
                    if (canPlace) {
                        for (let i = 0; i < w.length; i++) {
                            placedLetters[row * gridSize + col + i] = w[i];
                        }
                        placed = true;
                    }
                }
            }

            // Fill remaining with random letters
            for (let i = 0; i < gridSize * gridSize; i++) {
                let letter = placedLetters[i] || String.fromCharCode(65 + Math.floor(Math.random() * 26));
                grid.push(letter);

                let tile = document.createElement("div");
                tile.className = "tile";
                tile.innerText = letter;
                tile.dataset.index = i;

                tile.addEventListener("mousedown", function (e) {
                    e.preventDefault();
                    isSelecting = true;
                    clearSelection();
                    selectTile(this);
                });
                tile.addEventListener("mouseover", function () {
                    if (isSelecting) selectTile(this);
                });
                tile.addEventListener("touchstart", function (e) {
                    e.preventDefault();
                    isSelecting = true;
                    clearSelection();
                    selectTile(this);
                }, { passive: false });
                tile.addEventListener("touchmove", function (e) {
                    e.preventDefault();
                    const touch = e.touches[0];
                    const element = document.elementFromPoint(touch.clientX, touch.clientY);
                    if (element && element.classList.contains("tile")) {
                        selectTile(element);
                    }
                }, { passive: false });

                gridDiv.appendChild(tile);
            }

            document.addEventListener("mouseup", endSelect);
            document.addEventListener("touchend", endSelect);
        }

        function clearSelection() {
            selectedTiles.forEach(t => t.classList.remove("selected"));
            selectedTiles = [];
            currentWord = "";
            document.getElementById("currentWordDisplay").innerHTML = "&nbsp;";
        }

        function selectTile(tile) {
            if (tile.classList.contains("correct")) return;
            if (!selectedTiles.includes(tile)) {
                selectedTiles.push(tile);
                tile.classList.add("selected");
                currentWord += tile.innerText;
                document.getElementById("currentWordDisplay").innerText = currentWord;
            }
        }

        function endSelect() {
            if (!isSelecting) return;
            isSelecting = false;
            submitWord();
        }

        function submitWord() {
            if (currentWord.length === 0) return;
            totalAttempts++;

            if (words.includes(currentWord) && !foundWords.includes(currentWord)) {
                foundWords.push(currentWord);
                wordsFound++;
                score += 10 * combo;
                combo = Math.min(combo + 1, 5);
                updateScoreDisplay();
                updateComboDisplay();

                selectedTiles.forEach(t => {
                    t.classList.remove("selected");
                    t.classList.add("correct");
                });

                showToast("+" + (10 * (combo - 1)) + " " + currentWord + "!");

                // Check if all placed words in grid are found, regenerate if so
                checkAllFound();
            } else {
                combo = 1;
                updateComboDisplay();
                selectedTiles.forEach(t => {
                    t.classList.remove("selected");
                    t.classList.add("wrong");
                    setTimeout(() => t.classList.remove("wrong"), 400);
                });
            }

            selectedTiles = [];
            currentWord = "";
            document.getElementById("currentWordDisplay").innerHTML = "&nbsp;";
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 1200);
        }

        function shuffleGrid() {
            // Re-randomize non-correct tiles
            const tiles = document.querySelectorAll(".tile:not(.correct)");
            tiles.forEach(tile => {
                let newLetter = String.fromCharCode(65 + Math.floor(Math.random() * 26));
                tile.innerText = newLetter;
                grid[parseInt(tile.dataset.index)] = newLetter;
            });
            clearSelection();
        }

        function checkAllFound() {
            // Check if all tiles with placed words are found (all correct)
            const allTiles = document.querySelectorAll(".tile");
            const correctTiles = document.querySelectorAll(".tile.correct");
            const nonCorrectTiles = document.querySelectorAll(".tile:not(.correct)");

            // If most tiles are correct or all placed words found, regenerate
            if (correctTiles.length >= allTiles.length * 0.5 || foundWords.length >= 6) {
                showToast("🎉 New round!");
                setTimeout(() => {
                    foundWords = [];
                    createGrid();
                }, 800);
            }
        }

        function showHint() {
            // Highlight first letter of a not-yet-found word
            for (let w of words) {
                if (!foundWords.includes(w)) {
                    showToast("💡 Try: " + w[0] + "..." + w[w.length - 1]);
                    break;
                }
            }
        }

        function endGame() {
            document.getElementById("gameScreen").classList.add("hidden");
            document.getElementById("endScreen").classList.remove("hidden");

            document.getElementById("wordsFoundStat").innerText = wordsFound;
            document.getElementById("finalScoreStat").innerText = score.toLocaleString();

            let accuracy = totalAttempts > 0 ? Math.round((wordsFound / totalAttempts) * 100) : 0;
            document.getElementById("accuracyStat").innerText = accuracy + "%";

            let rank = "Bronze";
            if (score >= 200) rank = "Gold";
            else if (score >= 100) rank = "Silver";
            document.getElementById("rankStat").innerText = rank;
        }

        function restartGame() {
            window.location.href = "https://darkyplay.com/wordcatch";
        }

        function goMainMenu() {
            window.location.href = "https://darkyplay.com";
        }
    </script>

</body>
